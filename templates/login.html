{% extends 'base.html' %}
{% block title %}Admin Panel - Zomin E'lonlar{% endblock %}

{% block content %}
<section class="container" style="display:flex; justify-content:center; align-items:center; min-height:60vh;">
    <div class="glassmorphism-card" style="width:100%; max-width:400px; padding:40px;">
        <div style="text-align:center; margin-bottom:30px;">
            <i class="fas fa-shield-alt text-primary" style="font-size:48px; margin-bottom:15px;"></i>
            <h2>Tizimga kirish</h2>
            <p style="color:var(--gray);">Faqat administratorlar uchun</p>
        </div>

        <form method="POST" action="{{ url_for('admin_login') }}" class="modern-form">
            <div class="form-group mb-4">
                <label><i class="fas fa-user"></i> Login</label>
                <input type="text" name="username" placeholder="Loginni kiriting" required autofocus>
            </div>
            
            <div class="form-group mb-4">
                <label><i class="fas fa-lock"></i> Parol</label>
                <input type="password" name="password" placeholder="Parolni kiriting" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-large">
                Kirish <i class="fas fa-arrow-right ml-2"></i>
            </button>
        </form>
        
        <div style="text-align:center; margin-top:20px;">
            <a href="{{ url_for('index') }}" style="color:var(--gray);">&larr; Bosh sahifaga qaytish</a>
        </div>
    </div>
</section>
{% endblock %}
